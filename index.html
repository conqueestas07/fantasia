<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body style="margin:0">

<a-scene>
  <a-box     position="0 1 -3"  color="#ff0000"></a-box>
  <a-sphere  position="2 1 -3"  color="#00ff00"></a-sphere>
  <a-cylinder position="-2 1 -3" color="#0088ff"></a-cylinder>
  <a-plane   rotation="-90 0 0" width="20" height="20" color="#555"></a-plane>
  <a-sky     color="#224"></a-sky>
  <a-light   type="ambient"     intensity="1"></a-light>
  <a-light   type="directional" intensity="1" position="1 3 2"></a-light>
  <a-camera  position="0 1.6 0"></a-camera>
</a-scene>
