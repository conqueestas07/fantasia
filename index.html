<!DOCTYPE html>
<html><head>
  <title>Fantasía VR</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="world.js"></script>
</head><body>

<div id="hint">WASD · mover  |  ratón / gafas · mirar</div>

<!--
  FOG menos denso para que se vea desde lejos.
  Luces MÁS intensas.
  Todos los objetos a distancia visible (Z entre -5 y -40).
-->
<a-scene
  fog="type:exponential;color:#1a0a2e;density:0.008"
  renderer="antialias:true;colorManagement:true">

  <a-sky color="#1a0a2e"></a-sky>

  <!-- Luna — cercana y grande -->
  <a-sphere
    position="10 18 -40"
    radius="5"
    material="color:#e8d8ff;
              emissive:#c9a0ff;
              emissiveIntensity:0.8">
  </a-sphere>

  <!-- Suelo -->
  <a-plane
    rotation="-90 0 0"
    width="300" height="300"
    material="color:#12082a">
  </a-plane>

  <!-- Lago -->
  <a-circle
    rotation="-90 0 0"
    position="0 0.05 -12"
    radius="8"
    material="color:#3a2a8e;
              emissive:#220a5e;
              emissiveIntensity:0.5;
              opacity:0.9"
    animation="property:material.color;
               from:#3a2a8e;to:#1a3a9e;
               dur:3000;dir:alternate;loop:true">
  </a-circle>

  <!-- Entidades generadas por JS -->
  <a-entity id="stars"></a-entity>
  <a-entity id="trees"></a-entity>
  <a-entity id="crystals"></a-entity>
  <a-entity id="fireflies"></a-entity>
  <a-entity id="mountains"></a-entity>
  <a-entity id="ruins"></a-entity>

  <!-- LUCES — más intensas -->
  <a-light type="ambient"
            color="#7755cc"
            intensity="1.2"></a-light>
  <a-light type="directional"
            color="#ffffff"
            intensity="1.5"
            position="5 10 5"></a-light>
  <a-light type="point"
            color="#9955ff"
            intensity="3"
            distance="40"
            position="0 4 -5"></a-light>
  <a-light type="point"
            color="#44aaff"
            intensity="2"
            distance="30"
            position="0 2 -12"></a-light>

  <!-- JUGADOR -->
  <a-entity
    id="player"
    position="0 1.6 5"
    fantasy-movement="">
    <a-camera
      look-controls="pointerLockEnabled:true;
                     magicWindowTrackingEnabled:true"
      wasd-controls="enabled:false"
      fov="85">
    </a-camera>
    <a-entity oculus-touch-controls="hand:left"></a-entity>
    <a-entity oculus-touch-controls="hand:right"></a-entity>
  </a-entity>

</a-scene>
</body></html>
